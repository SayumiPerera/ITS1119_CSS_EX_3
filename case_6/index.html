<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Case 06</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <link rel="stylesheet" href="../assets/normalize.css">

    <style>

        section {
            width: 1000px;
            height: 500px;
            border: 2px solid black;

            display: grid;
            grid-template-columns: repeat(4, 1fr); /* repeat(3, 1fr) = 1fr 1fr 1fr */
        }

        section > div {
            border: 1px solid black;
        }

        section > div:first-child {
            background-color: red;
            grid-column: 1/3;
        }

        section > div:nth-child(2) {
            background-color: darkgreen;
        }

        section > div:nth-child(3) {
            background-color: orangered;
            grid-column: 4/5;
            grid-row: 1/4;
        }

        section > div:nth-child(4) {
            background-color: rebeccapurple;
        }

        section > div:nth-child(5) {
            background-color: deeppink;
        }

        section > div:nth-child(6) {
            background-color: blue;
        }

        section > div:nth-child(7) {
            background-color: brown;
        }

        section > div:nth-child(8) {
            background-color: darkblue;
            grid-column: 2/4;
        }
    </style>

</head>

<body>

<section>
    <div></div>
    <div></div>
    <div></div>
    <div></div>

    <div></div>
    <div></div>
    <div></div>
    <div></div>
</section>

</body>

</html>
