<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Case 05</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="assets/lib/normalize.css">

    <style>

        section {
            width: 1000px;
            height: 500px;
            border: 2px solid black;

            display: grid;
            grid-template-columns: repeat(4, 1fr); /* repeat(3, 1fr) = 1fr 1fr 1fr */
        }

        section > div {
            border: 1px solid black;
        }

        section > div:first-child {
            background-color: red;
        }

        section > div:nth-child(2) {
            background-color: darkgreen;
        }

        section > div:nth-child(3) {
            background-color: orangered;
        }

        section > div:nth-child(4) {
            background-color: purple;
        }

        section > div:nth-child(5) {
            background-color: deeppink;
        }

        section > div:nth-child(6) {
            background-color: blue;
        }

        section > div:nth-child(7) {
            background-color: brown;
        }

        section > div:nth-child(8) {
            background-color: mediumpurple;
        }

        section > div:nth-child(9) {
            background-color: darkslateblue;
        }

        section > div:nth-child(10) {
            background-color: gold;
        }


        section > div:nth-child(11) {
            background-color: lightslategrey;
        }

        section > div:nth-child(12) {
            background-color: lightseagreen;
        }
    </style>

</head>

<body>

<section>
    <div></div>
    <div></div>
    <div></div>
    <div></div>

    <div></div>
    <div></div>
    <div></div>
    <div></div>

    <div></div>
    <div></div>
    <div></div>
    <div></div>
</section>

</body>

</html>
